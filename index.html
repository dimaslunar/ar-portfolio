<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Portofolio Ku</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./kartunama.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./video-porto.mp4" webkit-playsinline playsinline muted loop></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" position="0 0 0" height="0.55" width="1" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const video = document.querySelector('#vid');

      target.addEventListener("targetFound", event => {
        video.play();
      });

      target.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
